name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of LuxHub is affected?
      options:
        - Marketplace
        - Pools / Trading
        - Escrow
        - Admin Dashboard
        - Vendor Dashboard
        - Smart Contract
        - API
        - Wallet Connection
        - Other
    validations:
      required: true

  - type: input
    id: wallet
    attributes:
      label: Wallet Address (optional)
      description: If relevant, your Solana wallet address
      placeholder: "e.g. 7xK..."

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Add any screenshots or console logs

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Brave
        - Edge
        - Mobile (iOS)
        - Mobile (Android)
        - Other
